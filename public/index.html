// ---------- CompareScreen (side-by-side, up to 5) ----------------------
function CompareScreen({ t, lang, go, route }){
  const en = lang === "en";
  const { parts, loading, progress } = useSearchResults({
    query: route.q, bulk: !!route.bulk, pns: route.pns,
  });
  const real = parts || [];
  const [selParts, setSelParts] = React.useState([]);
  const [group, setGroup] = React.useState({
    overview: true, lifecycle: true, pricing: true,
    compliance: true, packaging: false, documents: false, countries: false,
  });

  React.useEffect(()=>{
    if(!loading && !selParts.length && real.length){
      setSelParts(real.slice(0, Math.min(3, real.length)).map(p=>p.id));
    }
  }, [loading, real.length]);

  const cols = real.filter(p => selParts.includes(p.id));
  const enoughSelected = cols.length >= 2;

  const downloadCsv = () => {
    const rows = compareRows(cols, group, en);
    const csv = [["Attribute", ...cols.map(c=>c.mpn)], ...rows.map(r=>[
      r.label, ...r.values.map(v=>String(v ?? "—"))])]
      .map(r => r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","))
      .join("\n");
    const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `comparison-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  };

  const primary = (
    <div style={{display:"flex", gap:6}}>
      <Btn variant="quiet" size="sm" icon={Ico.exp()}
           onClick={enoughSelected ? downloadCsv : undefined}>
        {en?"Export CSV":"匯出 CSV"}
      </Btn>
      <Btn variant="primary" icon={Ico.dl()}
           onClick={enoughSelected ? ()=>{
             openPrintWindow(
               buildCompareHtml({ cols, group, lang }),
               en ? "Allow pop-ups to print." : "請允許快顯以列印。"
             );
           } : undefined}>
        {en?"Print":"列印"}
      </Btn>
    </div>
  );

  return (
    <ActionShell t={t} lang={lang} go={go} route={route}
      title={en?"Compare · side-by-side":"比較 · 並列"}
      subtitle={en
        ? `${cols.length}/5 components selected`
        : `已選 ${cols.length}/5 筆`}
      primary={primary}>

      {loading ? (
        <ResultsLoading progress={progress} lang={lang}
          isBulk={!!route.bulk}
          pnsCount={Array.isArray(route.pns)?route.pns.length:0}/>
      ) : (
        <div style={{display:"grid", gridTemplateColumns:"320px 1fr", gap:14}}>
          <div style={{display:"flex", flexDirection:"column", gap:14}}>
            <PartChecklist lang={lang} parts={real}
              selected={selParts} setSelected={setSelParts}
              max={5} title={en?"Pick up to 5":"最多選 5 筆"}/>
            <div style={{background:"#fff", border:"1px solid var(--line)"}}>
              <div style={{padding:"10px 14px",
                   borderBottom:"1px solid var(--line)",
                   fontSize:11, fontFamily:"'IBM Plex Mono', monospace",
                   letterSpacing:"0.12em", textTransform:"uppercase",
                   color:"var(--ink-3)"}}>
                {en?"Attribute groups":"屬性分類"}
              </div>
              <div>
                {[
                  ["overview",en?"Overview":"總覽"],
                  ["lifecycle",en?"Lifecycle & Risk":"生命週期與風險"],
                  ["pricing",en?"Pricing & Stock":"價格與庫存"],
                  ["compliance",en?"Compliance":"法規符合"],
                  ["packaging",en?"Packaging":"封裝資料"],
                  ["documents",en?"Documents":"文件"],
                  ["countries",en?"Countries":"原產地"],
                ].map(([k,l])=>(
                  <label key={k} style={{display:"flex", alignItems:"center",
                       gap:10, padding:"8px 14px",
                       borderBottom:"1px dashed var(--line)",
                       cursor:"pointer"}}>
                    <input type="checkbox" checked={!!group[k]}
                      onChange={e=>setGroup(g=>({...g, [k]: e.target.checked}))}
                      style={{accentColor:"var(--accent)"}}/>
                    <span style={{fontSize:12.5}}>{l}</span>
                  </label>
                ))}
              </div>
            </div>
          </div>

          <div style={{background:"#fff", border:"1px solid var(--line)",
               overflow:"auto"}}>
            {!enoughSelected ? (
              <div style={{padding:"60px 28px", textAlign:"center",
                   color:"var(--ink-3)", fontSize:13, lineHeight:1.6}}>
                {en
                  ? "Select at least 2 components on the left to build a comparison table."
                  : "請於左側至少選 2 筆以產生比較表。"}
              </div>
            ) : (
              <CompareTable cols={cols} group={group} lang={lang}/>
            )}
          </div>
        </div>
      )}
    </ActionShell>
  );
}

function compareRows(cols, group, en){
  const rows = [];
  const grp = (id, label, values, numeric) =>
    rows.push({ id, label, values, numeric: !!numeric });
  if(group.overview){
    grp("g-overview", en?"— Overview":"— 總覽", cols.map(()=>""));
    grp("mpn",          en?"MPN":"製造商料號",   cols.map(p=>p.mpn));
    grp("advPN",        en?"Advantech P/N":"研華料號", cols.map(p=>p.advPN||"—"));
    grp("mfr",          en?"Manufacturer":"製造商", cols.map(p=>p.mfr));
    grp("category",     en?"Category":"類別",     cols.map(p=>p.category));
    grp("desc",         en?"Description":"描述",  cols.map(p=>p.desc));
  }
  if(group.lifecycle){
    grp("g-lc", en?"— Lifecycle & Risk":"— 生命週期與風險", cols.map(()=>""));
    grp("lifecycle",    en?"Lifecycle":"生命週期", cols.map(p=>p.lifecycle));
    grp("yeol",         en?"Years to EOL":"預估 EOL 年限",
      cols.map(p=>(p.yeol||0).toFixed(1)+"y"), true);
    grp("eolDate",      en?"Estimated EOL":"預估停產日",
      cols.map(p=>p.eolDate||"—"));
    grp("risk",         en?"Risk %":"風險 %",
      cols.map(p=>p.risk.toFixed(0)+"%"), "lowerBetter");
    grp("resilience",   en?"Resilience":"韌性",
      cols.map(p=>typeof p.resilience==="number"
         ? p.resilience.toFixed(1)+" / 10" : "—"), true);
  }
  if(group.pricing){
    grp("g-pr", en?"— Pricing & Stock":"— 價格與庫存", cols.map(()=>""));
    grp("priceMin",     en?"Min unit price":"最低單價",
      cols.map(p=>typeof p.priceMin==="number"?"$"+p.priceMin.toFixed(4):"—"),
      "lowerBetter");
    grp("priceAvg",     en?"Avg unit price":"平均單價",
      cols.map(p=>typeof p.priceAvg==="number"?"$"+p.priceAvg.toFixed(4):"—"));
    grp("stock",        en?"Total inventory":"總庫存",
      cols.map(p=>typeof p.totalInventory==="number"
         ? p.totalInventory.toLocaleString() : "—"), true);
    grp("channels",     en?"Distributors":"通路",
      cols.map(p=>typeof p.distributorsWithStock==="number"
         ? String(p.distributorsWithStock) : "—"), true);
  }
  if(group.compliance){
    grp("g-cp", en?"— Compliance":"— 法規符合", cols.map(()=>""));
    grp("rohs",   "RoHS",  cols.map(p=>p.rohs ? "✓" : "—"));
    grp("reach",  "REACH", cols.map(p=>p.reach ? "✓" : "—"));
    grp("ce",     "CE",    cols.map(p=>p.ce ? "✓" : "—"));
  }
  if(group.packaging){
    grp("g-pk", en?"— Packaging":"— 封裝資料", cols.map(()=>""));
    grp("package",  en?"Package":"封裝",
      cols.map(p=>(p.packaging && p.packaging.packaging) || "—"));
    grp("qty",      en?"Qty per package":"每包數量",
      cols.map(p=>(p.packaging && p.packaging.qtyPerPackaging) || "—"));
    grp("mount",    en?"Mounting":"安裝方式",
      cols.map(p=>(p.packaging && p.packaging.mounting) || "—"));
  }
  if(group.documents){
    grp("g-dc", en?"— Documents":"— 文件", cols.map(()=>""));
    grp("docs",     en?"Document count":"文件數量",
      cols.map(p=>String(Array.isArray(p.documents)?p.documents.length:0)),
      true);
  }
  if(group.countries){
    grp("g-cn", en?"— Countries of Origin":"— 原產地", cols.map(()=>""));
    grp("countries", en?"Country count":"國家數",
      cols.map(p=>String(Array.isArray(p.countries)?p.countries.length:0)),
      true);
  }
  return rows;
}

function CompareTable({ cols, group, lang }){
  const en = lang === "en";
  const rows = compareRows(cols, group, en);
  // Find best/worst per numeric row to highlight winners.
  const winners = rows.map(r => {
    if(!r.numeric) return null;
    const nums = r.values.map(v => {
      if(typeof v !== "string") return NaN;
      const m = v.replace(/[^-0-9.]/g,"");
      return m ? parseFloat(m) : NaN;
    });
    const valid = nums.filter(n=>!Number.isNaN(n));
    if(!valid.length) return null;
    const lowerBetter = r.numeric === "lowerBetter";
    const best = lowerBetter ? Math.min(...valid) : Math.max(...valid);
    const worst = lowerBetter ? Math.max(...valid) : Math.min(...valid);
    return nums.map(n => n === best ? "best" : (n === worst && best !== worst ? "worst" : null));
  });
  return (
    <table style={{width:"100%", borderCollapse:"collapse", fontSize:12.5}}>
      <thead>
        <tr style={{borderBottom:"1px solid var(--line-strong)"}}>
          <th style={{
            textAlign:"left", padding:"12px 14px",
            fontFamily:"'IBM Plex Mono', monospace", fontSize:11,
            color:"var(--ink-3)", letterSpacing:"0.1em",
            textTransform:"uppercase", width:220,
          }}>{en?"Attribute":"屬性"}</th>
          {cols.map(c=>(
            <th key={c.id} style={{
              textAlign:"left", padding:"12px 14px",
              verticalAlign:"bottom",
              borderLeft:"1px solid var(--line)",
            }}>
              <div style={{fontFamily:"'IBM Plex Mono', monospace",
                   fontSize:10.5, color:"var(--ink-4)",
                   letterSpacing:"0.1em", textTransform:"uppercase"}}>
                {c.mfr}
              </div>
              <div style={{fontFamily:"'IBM Plex Mono', monospace",
                   fontSize:13.5, fontWeight:600, marginTop:2}}>
                {c.mpn}
              </div>
              <div style={{fontSize:11, color:"var(--ink-3)",
                   fontFamily:"'IBM Plex Mono', monospace", marginTop:2}}>
                {c.advPN || "—"}
              </div>
              <div style={{display:"flex", gap:4, marginTop:6}}>
                <Pill tone={lifecycleTone(c.lifecycle)}>
                  <Dot tone={lifecycleTone(c.lifecycle)}/>{c.lifecycle}
                </Pill>
              </div>
            </th>
          ))}
        </tr>
      </thead>
      <tbody>
        {rows.map((r,i)=>{
          const isGroup = r.id.startsWith("g-");
          if(isGroup){
            return (
              <tr key={r.id} style={{background:"var(--surface-2)"}}>
                <td colSpan={cols.length+1} style={{
                  padding:"8px 14px", fontSize:10.5,
                  color:"var(--ink-3)",
                  fontFamily:"'IBM Plex Mono', monospace",
                  letterSpacing:"0.12em", textTransform:"uppercase",
                }}>{r.label}</td>
              </tr>
            );
          }
          return (
            <tr key={r.id} style={{borderBottom:"1px solid var(--line)"}}>
              <td style={{padding:"10px 14px",
                   color:"var(--ink-3)", fontSize:11.5,
                   fontFamily:"'IBM Plex Mono', monospace"}}>{r.label}</td>
              {r.values.map((v,j)=>{
                const w = winners[i] && winners[i][j];
                return (
                  <td key={j} style={{
                    padding:"10px 14px", borderLeft:"1px solid var(--line)",
                    background: w==="best" ? "#eaf4ed"
                              : w==="worst" ? "#fbeeea" : "transparent",
                    fontWeight: w==="best" ? 600 : 400,
                    color: w==="best" ? "#23603c"
                         : w==="worst" ? "#8a2414" : "var(--ink)",
                    fontFamily: typeof v === "string" && /^[$\d]/.test(v)
                      ? "'IBM Plex Mono', monospace" : "inherit",
                  }}>{v ?? "—"}</td>
                );
              })}
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

Object.assign(window, {
  useSearchResults, DownloadScreen, ExportScreen, WatchScreen, CompareScreen,
});


/* ===== app.babel.js ===== */
// App root: router, state, tweaks wiring.

function App(){
  const [route, setRoute] = React.useState(() => {
    const saved = localStorage.getItem("ci-route");
    return saved ? JSON.parse(saved) : { name:"home" };
  });
  const [lang, setLang] = React.useState(() => localStorage.getItem("ci-lang") || "en");
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweakOn, setTweakOn] = React.useState(false);

  React.useEffect(()=>{
    localStorage.setItem("ci-route", JSON.stringify(route));
    window.scrollTo(0,0);
  },[route]);
  React.useEffect(()=>{ localStorage.setItem("ci-lang", lang); window.__lang = lang; },[lang]);
  React.useEffect(()=>{
    document.documentElement.style.setProperty("--accent", tweaks.accent);
    document.documentElement.style.setProperty("--accent-ink", tweaks.accent);
    window.__chartMode = tweaks.chartMode;
    window.dispatchEvent(new Event("tweaks-changed"));
  },[tweaks]);

  // edit-mode host contract
  React.useEffect(()=>{
    const onMsg = (e) => {
      const d = e.data || {};
      if(d.type === "__activate_edit_mode") setTweakOn(true);
      if(d.type === "__deactivate_edit_mode") setTweakOn(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type:"__edit_mode_available" }, "*");
    return ()=>window.removeEventListener("message", onMsg);
  },[]);

  const t = I18N[lang];
  const go = (r) => setRoute(r);

  // Sidebar show/hide — persists across navigations and reloads.
  const SIDEBAR_KEY = "ci-sidebar-collapsed";
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(() => {
    try { return localStorage.getItem(SIDEBAR_KEY) === "1"; } catch { return false; }
  });
  React.useEffect(()=>{
    try { localStorage.setItem(SIDEBAR_KEY, sidebarCollapsed ? "1" : "0"); } catch {}
  }, [sidebarCollapsed]);

  return (
    <>
      <TopBar t={t} route={route} go={go} lang={lang} setLang={setLang}/>
      <PageShell collapsed={sidebarCollapsed}>
        <SideNav t={t} lang={lang} route={route} go={go}
                 collapsed={sidebarCollapsed}
                 setCollapsed={setSidebarCollapsed}/>
        <main>
          {route.name==="home" && <HomeScreen t={t} lang={lang} go={go} initialTab={route.tab || "single"}/>}
          {route.name==="results" && <ResultsScreen t={t} lang={lang} go={go}
              query={route.q || ""} bulk={!!route.bulk} pns={Array.isArray(route.pns) ? route.pns : null}/>}
          {route.name==="download" && <DownloadScreen t={t} lang={lang} go={go} route={route}/>}
          {route.name==="export"   && <ExportScreen   t={t} lang={lang} go={go} route={route}/>}
          {route.name==="watch"    && <WatchScreen    t={t} lang={lang} go={go} route={route}/>}
          {route.name==="compare"  && <CompareScreen  t={t} lang={lang} go={go} route={route}/>}
          {route.name==="detail"  && <DetailScreen  t={t} lang={lang} go={go}
              id={route.id} routePN={route.pn} routeMPN={route.mpn} routeMfr={route.mfr}/>}
        </main>
      </PageShell>
      {tweakOn && <TweaksPanel t={t} values={tweaks} setValues={setTweaks}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);


</script>

</body>
