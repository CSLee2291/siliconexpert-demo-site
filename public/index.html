// Price trend chart — line + min/max range band + hover tooltip + optional volume bars.

function PriceChart({ series, mode="band", height=280, accent="var(--accent)" }){
  const ref = React.useRef(null);
  const [hover, setHover] = React.useState(null);
  const [w, setW] = React.useState(720);

  React.useEffect(()=>{
    if(!ref.current) return;
    const ro = new ResizeObserver(ents=>{
      const cr = ents[0].contentRect; setW(Math.max(420, cr.width));
    });
    ro.observe(ref.current);
    return ()=>ro.disconnect();
  },[]);

  const padL=56, padR=18, padT=18, padB= mode==="bars" ? 58 : 34;
  const h = height;
  const allMax = Math.max(...series.map(s=>s.max));
  const allMin = Math.min(...series.map(s=>s.min));
  const span = allMax-allMin; const yMax = allMax + span*0.15; const yMin = Math.max(0, allMin - span*0.15);
  const xAt = (i) => padL + (i/(series.length-1)) * (w - padL - padR);
  const yAt = (v) => h - padB - ((v - yMin)/(yMax-yMin)) * (h - padT - padB);

  const avgPath = "M" + series.map(s => xAt(s.i) + " " + yAt(s.avg)).join(" L");
  const bandTop = series.map(s => [xAt(s.i), yAt(s.max)]);
  const bandBot = series.map(s => [xAt(s.i), yAt(s.min)]).reverse();
  const bandPath = "M" + bandTop.map(p=>p.join(" ")).join(" L") + " L" + bandBot.map(p=>p.join(" ")).join(" L") + " Z";

  // gridlines
  const ticks = 5;
  const yTicks = Array.from({length:ticks},(_,k)=>{
    const v = yMin + (yMax-yMin) * (k/(ticks-1));
    return { v, y: yAt(v) };
  });

  const volMax = Math.max(...series.map(s=>s.volume));

  const onMove = (e)=>{
    const rect = ref.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    let best=0, bd=1e9;
    for(let i=0;i<series.length;i++){
      const d = Math.abs(xAt(i)-x);
      if(d<bd){ bd=d; best=i; }
    }
    setHover(best);
  };

  const hs = hover!=null ? series[hover] : null;

  return (
    <div ref={ref} style={{position:"relative", width:"100%"}}
         onMouseLeave={()=>setHover(null)} onMouseMove={onMove}>
      <svg width={w} height={h} style={{display:"block"}}>
        {/* Gridlines */}
        {yTicks.map((t,i)=>(
          <g key={i}>
            <line x1={padL} x2={w-padR} y1={t.y} y2={t.y} stroke="var(--line)" strokeDasharray={i===0||i===ticks-1?"0":"2 3"}/>
            <text x={padL-10} y={t.y+3} fontSize="10.5" fill="var(--ink-4)" fontFamily="IBM Plex Mono, monospace" textAnchor="end">
              ${t.v.toFixed(0)}
            </text>
          </g>
        ))}

        {/* X labels */}
        {series.map(s => (
          <text key={s.i} x={xAt(s.i)} y={h - (mode==="bars" ? 36 : 12)}
                fontSize="10.5" fill="var(--ink-4)" fontFamily="IBM Plex Mono, monospace" textAnchor="middle">{s.label}</text>
        ))}

        {/* Volume bars */}
        {mode==="bars" && series.map(s=>{
          const bh = (s.volume/volMax) * 18;
          return <rect key={s.i}
            x={xAt(s.i)-6} width="12"
            y={h-28-bh} height={bh}
            fill="var(--line-strong)"/>;
        })}
        {mode==="bars" && (
          <text x={padL} y={h-6} fontSize="10" fill="var(--ink-4)"
                fontFamily="IBM Plex Mono, monospace" letterSpacing="0.1em">VOLUME · UNITS / MO</text>
        )}

        {/* Range band */}
        {mode==="band" && (
          <path d={bandPath} fill={accent} fillOpacity="0.09"/>
        )}

        {/* min / max guides */}
        {mode==="band" && (
          <>
            <path d={"M" + series.map(s=>xAt(s.i)+" "+yAt(s.max)).join(" L")}
                  fill="none" stroke={accent} strokeOpacity="0.4" strokeWidth="1" strokeDasharray="3 3"/>
            <path d={"M" + series.map(s=>xAt(s.i)+" "+yAt(s.min)).join(" L")}
                  fill="none" stroke={accent} strokeOpacity="0.4" strokeWidth="1" strokeDasharray="3 3"/>
          </>
        )}

        {/* Avg line */}
        <path d={avgPath} fill="none" stroke="var(--ink)" strokeWidth="1.6"/>
        {series.map(s=>(
          <circle key={s.i} cx={xAt(s.i)} cy={yAt(s.avg)} r="2.2" fill="var(--ink)"/>
        ))}

        {/* Hover crosshair */}
        {hs && (
          <>
            <line x1={xAt(hs.i)} x2={xAt(hs.i)} y1={padT} y2={h-padB} stroke="var(--ink)" strokeDasharray="2 2" strokeOpacity="0.4"/>
            <circle cx={xAt(hs.i)} cy={yAt(hs.avg)} r="4.5" fill="var(--accent)" stroke="#fff" strokeWidth="1.5"/>
            <circle cx={xAt(hs.i)} cy={yAt(hs.max)} r="2.5" fill={accent}/>
            <circle cx={xAt(hs.i)} cy={yAt(hs.min)} r="2.5" fill={accent}/>
          </>
        )}
      </svg>

      {/* Tooltip */}
      {hs && (
        <div style={{
          position:"absolute", pointerEvents:"none",
          left: Math.min(w-190, Math.max(0, xAt(hs.i) - 90)), top: 8,
          background:"#14161a", color:"#fff", border:"1px solid #14161a",
          padding:"8px 10px", minWidth:175, fontSize:11.5,
          fontFamily:"'IBM Plex Mono', monospace",
        }}>
          <div style={{color:"#9aa0aa", fontSize:10.5, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:4}}>
            {hs.label} 2025
          </div>
          <Row k="Avg"  v={"$"+hs.avg.toFixed(2)} strong/>
          <Row k="Max"  v={"$"+hs.max.toFixed(2)}/>
          <Row k="Min"  v={"$"+hs.min.toFixed(2)}/>
          <Row k="Vol"  v={hs.volume.toLocaleString() + " u"}/>
        </div>
      )}

      {/* Legend */}
      <div style={{
        position:"absolute", right:18, top:12,
        display:"flex", gap:14, fontSize:11, color:"var(--ink-3)",
        fontFamily:"'IBM Plex Mono', monospace",
      }}>
        <span><span style={{display:"inline-block",width:14,height:2,background:"var(--ink)",verticalAlign:"middle",marginRight:5}}/>Avg</span>
        {mode==="band" && <span><span style={{display:"inline-block",width:14,height:8,background:accent,opacity:0.18,verticalAlign:"middle",marginRight:5}}/>Min ↔ Max</span>}
        {mode==="bars" && <span><span style={{display:"inline-block",width:12,height:8,background:"var(--line-strong)",verticalAlign:"middle",marginRight:5}}/>Volume</span>}
      </div>
    </div>
  );
}

function Row({ k, v, strong }){
  return (
    <div style={{display:"flex", justifyContent:"space-between", gap:12, padding:"1px 0"}}>
      <span style={{color:"#9aa0aa"}}>{k}</span>
      <span style={{color:"#fff", fontWeight: strong?600:400}}>{v}</span>
    </div>
  );
}

  const [apiPackaging, setApiPackaging] = React.useState(null);
  const [apiCountries, setApiCountries] = React.useState(null);
  const [apiCand, setApiCand] = React.useState(null);

  const [tab, setTab] = React.useState("overview");

    setApiDocuments(null); setApiPackaging(null); setApiCountries(null);

    const params = routePN

      if(cancelled || !res) return;
      setApiPart(res.part || null);

      setApiCommercial(res.commercial || null);
      setApiParametric(res.parametric || null);

        <span>/</span>
        <span style={{color:"var(--ink)"}}>{part.mpn}</span>

            <Pill tone={lcTone}><Dot tone={lcTone}/>{part.lifecycle}</Pill>

          </div>
          <h1 style={{margin:"6px 0 4px", fontFamily:"'IBM Plex Mono', monospace", fontSize:26, fontWeight:600, letterSpacing:"-0.01em"}}>{part.mpn}</h1>
          <div style={{color:"var(--ink-2)", fontSize:13.5, lineHeight:1.55, maxWidth:640}}>{part.desc}</div>

function MiniTrend({ series }){
  const ref = React.useRef(null);
  const [w, setW] = React.useState(360);
  React.useEffect(()=>{
    if(!ref.current) return;
    const ro = new ResizeObserver(e=>setW(Math.max(240,e[0].contentRect.width)));
    ro.observe(ref.current);
    return ()=>ro.disconnect();
  },[]);
  const h=170, padL=40, padR=8, padT=8, padB=24;
  const mn = Math.min(...series.map(s=>s.min));
  const mx = Math.max(...series.map(s=>s.max));
  const xAt = i => padL + (i/(series.length-1))*(w-padL-padR);
  const yAt = v => h-padB - ((v-mn)/(mx-mn))*(h-padT-padB);
  const band = "M" + series.map(s=>xAt(s.i)+" "+yAt(s.max)).join(" L") + " L" + series.map(s=>xAt(s.i)+" "+yAt(s.min)).reverse().join(" L") + " Z";
  const line = "M" + series.map(s=>xAt(s.i)+" "+yAt(s.avg)).join(" L");
  return (
    <div ref={ref} style={{width:"100%"}}>
      <svg width={w} height={h}>
        <path d={band} fill="var(--accent)" fillOpacity="0.08"/>
        <path d={line} fill="none" stroke="var(--ink)" strokeWidth="1.4"/>
        {series.map((s,i)=> i%3===0 &&
          <text key={i} x={xAt(s.i)} y={h-8} fontSize="10" fill="var(--ink-4)"
                fontFamily="IBM Plex Mono, monospace" textAnchor="middle">{s.label}</text>)}
        {[0,1,2].map(k=>{
          const v = mn + (mx-mn)*(k/2);
          // Scale-aware precision: whole dollars for ≥ $100, cents below.
          const digits = mx >= 100 ? 0 : mx >= 1 ? 2 : 3;
          return <text key={k} x={padL-6} y={yAt(v)+3} fontSize="10" fill="var(--ink-4)"
                       fontFamily="IBM Plex Mono, monospace" textAnchor="end">${v.toFixed(digits)}</text>;
        })}
      </svg>
    </div>
  );
}

function Lifecycle({ t, lang, p }){
  // Real /partDetail LifeCycleData + RiskData + ResilienceRating/FullCounterfeitData
  // flow into p.* through mergeApiPart. Values render as "—" when SE didn't populate.
  const stages = ["Introduction","Growth","Mature","Decline","NRND","EOL","Obsolete"];
  const currentIdx = stages.indexOf(p.stage) >= 0 ? stages.indexOf(p.stage) : 2;
  const rg = p.riskGrades || {};
  const gradeTone = g => /^(Very )?High/i.test(g) ? "danger"
                       : /Medium/i.test(g) ? "warn"
                       : /Low/i.test(g)    ? "ok" : "neutral";
  const risks = [
    { label: lang==="en"?"Lifecycle risk":"生命週期風險",
      grade: rg.lifecycle || p.lifeCycleRiskGrade || "—", src:"LifeCycleRiskGrade" },
    { label: lang==="en"?"Multi-sourcing risk":"多源替代風險",
      grade: rg.multiSourcing || "—", src:"MultiSourcingRisk" },
    { label: lang==="en"?"Inventory risk":"庫存風險",
      grade: rg.inventory || "—", src:"InventoryRisk" },
    { label: lang==="en"?"RoHS risk":"RoHS 風險",
      grade: rg.rohs || "—", src:"RohsRisk" },

    <div style={{display:"flex", justifyContent:"space-between", padding:"6px 0",

            {stages.map((s,i)=>(
              <div key={s} style={{flex:1, textAlign:"center", position:"relative"}}>
                <div style={{
                  position:"absolute", top:-17, left:"50%", transform:"translateX(-50%)",
                  width:10, height:10, borderRadius:10,
                  background: i<=currentIdx ? "var(--ink)" : "#fff",
                  border:"2px solid "+(i===currentIdx?"var(--accent)":"var(--line-strong)"),
                }}/>
                <div style={{fontSize:10.5, color: i===currentIdx ? "var(--ink)" : "var(--ink-4)",
                     fontWeight: i===currentIdx?600:400, fontFamily:"'IBM Plex Mono', monospace",
                     letterSpacing:"0.06em", textTransform:"uppercase"}}>{s}</div>
              </div>
            ))}
          </div>
        </div>

        {/* EOL estimate band — min / avg / max in years */}
        <div style={{marginTop:20, padding:"0 2px"}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline",
               fontSize:11, color:"var(--ink-3)", fontFamily:"'IBM Plex Mono', monospace",
               letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6}}>
            <span>{lang==="en"?"Years to EOL · SE range":"至 EOL 年數 · SE 估計範圍"}</span>
            <span>
              {typeof p.minYeol === "number" ? p.minYeol.toFixed(1) : "—"}
              {"  /  "}
              <b style={{color:"var(--ink)"}}>{typeof p.yeol==="number" ? p.yeol.toFixed(1) : "—"}</b>

              {typeof p.maxYeol === "number" ? p.maxYeol.toFixed(1) : "—"}

          {(() => {

        </Section>

        <Section title={t.riskFactors} subtitle={`· ${risks.length} grades`}>
          {risks.map((r,i)=>{
            const tone = gradeTone(r.grade);
            const barPct = /Very High/i.test(r.grade) ? 100
                          : /High/i.test(r.grade) ? 75
                          : /Medium/i.test(r.grade) ? 50

      <div style={{fontSize:10.5, color:"var(--ink-4)", fontFamily:"'IBM Plex Mono', monospace",
           letterSpacing:"0.1em", textTransform:"uppercase"}}>{label}</div>
      <div style={{fontFamily:"'IBM Plex Mono', monospace", fontSize:16, fontWeight:600, color, marginTop:2}}>{value}</div>
      <div style={{fontSize:11, color:"var(--ink-3)"}}>{note}</div>
    </div>
  );
}

// ---------- Cross Reference (SE /xref) ----------
function CrossReference({ t, lang, p }){
  const [data, setData] = React.useState(null); // null=loading, {...} once loaded
  const [error, setError] = React.useState(null);
  const [filterType, setFilterType] = React.useState("all");
  const [filterLc, setFilterLc] = React.useState("all");
  const [page, setPage] = React.useState(0);
  const pageSize = 20;

  // Best key: prefer ComID, then MPN(+Mfr), then Advantech PN.
  const queryKey = React.useMemo(()=>{
    const qs = new URLSearchParams();
    if(p.id)      qs.set("comId", String(p.id));
    else if(p.mpn){ qs.set("mpn", p.mpn); if(p.mfr) qs.set("manufacturer", p.mfr); }
    else if(p.advPN) qs.set("pn", p.advPN);
    return qs.toString();
  }, [p.id, p.mpn, p.mfr, p.advPN]);

  React.useEffect(()=>{
    if(!queryKey){ setData({ crosses: [], count: 0, status: "empty",
                             reason: "No PN / MPN / ComID to query" }); return; }
    let cancelled = false;
    setData(null); setError(null); setPage(0);
    fetch(`/api/xref?${queryKey}`)
      .then(r => r.json())
      .then(j => { if(!cancelled) setData(j); })
      .catch(e => { if(!cancelled) setError(String(e)); });
    return ()=>{ cancelled = true; };
  }, [queryKey]);

  if(error){
    return (
      <div style={{padding:"24px 18px", color:"var(--danger)", fontSize:12.5}}>
        {lang==="en"?"Cross reference lookup failed · ":"/xref 呼叫失敗 · "}{error}
      </div>
    );
  }
  if(!data){
    return (
      <div style={{padding:"36px 18px", textAlign:"center", color:"var(--ink-3)",
           fontSize:12.5}}>
        {lang==="en"?"Loading cross references from SiliconExpert…":"載入交叉參考…"}
      </div>
    );
  }

  const all = Array.isArray(data.crosses) ? data.crosses : [];
  if(!all.length){
    return (
      <div style={{padding:"36px 18px"}}>
        <div style={{padding:"14px 16px", background:"#fbf3df",
             border:"1px solid #e6d39a", color:"#735108"}}>
          <div style={{fontWeight:600, marginBottom:4,
               display:"flex", alignItems:"center", gap:8}}>
            <span>⚠</span>
            {lang==="en"?"No cross references":"無交叉參考資料"}
          </div>
          <div style={{fontSize:12}}>{data.reason ||
            (lang==="en"?"SiliconExpert returned no crosses for this part.":
                         "SiliconExpert 無此料號的替代品資訊。")}</div>
        </div>
      </div>
    );
  }

  // Filter controls
  const types = Array.from(new Set(all.map(x => x.type).filter(Boolean))).sort();
  const lcs   = Array.from(new Set(all.map(x => x.lifecycle).filter(Boolean))).sort();
  const filtered = all.filter(x =>
    (filterType==="all" || x.type===filterType) &&
    (filterLc==="all"   || x.lifecycle===filterLc));
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  const safePage = Math.min(page, totalPages - 1);
  const view = filtered.slice(safePage*pageSize, (safePage+1)*pageSize);

  const typeTone = code => {
    if(code==="A" || code==="G") return "ok";
    if(code==="B" || code==="C" || code==="E" || code==="F") return "warn";
    if(code==="D") return "danger";
    return "neutral";
  };

  const fmt$ = v => typeof v === "number" ? "$"+v.toFixed(4).replace(/0+$/,"").replace(/\.$/,"") : "—";
  const weeks = (a,b) => {
    const norm = s => s.replace(/\s*Week\(s\)/i,"w").trim();
    if(a && b && a!==b) return `${norm(a)}–${norm(b)}`;
    return norm(a) || norm(b) || "—";
  };

  return (
    <>
      <div style={{padding:"14px 18px", borderBottom:"1px solid var(--line)",
           display:"flex", gap:14, alignItems:"center", flexWrap:"wrap"}}>
        <div style={{fontSize:11, color:"var(--ink-3)",
             fontFamily:"'IBM Plex Mono', monospace", letterSpacing:"0.12em",
             textTransform:"uppercase"}}>
          {lang==="en"?"Crosses from SE /xref":"交叉參考 · SE /xref"}
        </div>
        <div style={{fontFamily:"'IBM Plex Mono', monospace", fontSize:12}}>
          <span style={{color:"var(--ink)"}}>{filtered.length.toLocaleString()}</span>
          <span style={{color:"var(--ink-3)"}}> {lang==="en"?"shown":"顯示"} · </span>
          <span style={{color:"var(--ink)"}}>{(data.count||all.length).toLocaleString()}</span>
          <span style={{color:"var(--ink-3)"}}> {lang==="en"?"total":"筆"}</span>
        </div>
        <div style={{flex:1}}/>
        <label style={{fontSize:11, color:"var(--ink-3)",
             fontFamily:"'IBM Plex Mono', monospace",
             display:"flex", alignItems:"center", gap:6}}>
          <span style={{letterSpacing:"0.1em", textTransform:"uppercase"}}>
            {lang==="en"?"Type":"類型"}
          </span>
          <select value={filterType} onChange={e=>{ setFilterType(e.target.value); setPage(0); }}
            style={{padding:"2px 6px", fontSize:12, border:"1px solid var(--line-2)"}}>
            <option value="all">{lang==="en"?"all":"全部"}</option>
            {types.map(c => {
              const first = all.find(x => x.type === c);
              const label = (first && first.typeLabel) || c;
              const n = all.filter(x=>x.type===c).length;
              return <option key={c} value={c}>{label} ({n})</option>;
            })}
          </select>
        </label>
        <label style={{fontSize:11, color:"var(--ink-3)",
             fontFamily:"'IBM Plex Mono', monospace",
             display:"flex", alignItems:"center", gap:6}}>
          <span style={{letterSpacing:"0.1em", textTransform:"uppercase"}}>
            {lang==="en"?"Lifecycle":"週期"}
          </span>
          <select value={filterLc} onChange={e=>{ setFilterLc(e.target.value); setPage(0); }}
            style={{padding:"2px 6px", fontSize:12, border:"1px solid var(--line-2)"}}>
            <option value="all">{lang==="en"?"all":"全部"}</option>
            {lcs.map(s => {
              const n = all.filter(x=>x.lifecycle===s).length;
              return <option key={s} value={s}>{s} ({n})</option>;
            })}
          </select>
        </label>
      </div>

      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%", borderCollapse:"collapse", fontSize:12}}>
          <thead>
            <tr style={{background:"var(--surface-2)",
                 fontSize:10.5, color:"var(--ink-3)",
                 fontFamily:"'IBM Plex Mono', monospace",
                 letterSpacing:"0.08em", textTransform:"uppercase"}}>
              <th style={{padding:"10px 12px", textAlign:"left", width:"22%"}}>
                {lang==="en"?"Cross part":"替代料號"}
              </th>
              <th style={{padding:"10px 12px", textAlign:"left", width:"18%"}}>
                {lang==="en"?"Manufacturer":"製造商"}
              </th>
              <th style={{padding:"10px 12px", textAlign:"left"}}>
                {lang==="en"?"Lifecycle":"週期"}
              </th>
              <th style={{padding:"10px 12px", textAlign:"left"}}>
                {lang==="en"?"Match":"匹配"}
              </th>
              <th style={{padding:"10px 12px", textAlign:"left"}}>RoHS</th>
              <th style={{padding:"10px 12px", textAlign:"right"}}>
                {lang==="en"?"Min / Avg price":"最低 / 平均"}
              </th>
              <th style={{padding:"10px 12px", textAlign:"left"}}>
                {lang==="en"?"Lead time":"交期"}
              </th>
              <th style={{padding:"10px 12px", textAlign:"left", width:"22%"}}>
                {lang==="en"?"Description / note":"描述 / 備註"}
              </th>
            </tr>
          </thead>
          <tbody>
            {view.map((x,i)=>{
              const tone = typeTone(x.type);
              const toneBg = tone==="ok"?"var(--ok-wash)"
                           : tone==="warn"?"var(--warn-wash)"
                           : tone==="danger"?"var(--accent-wash)":"transparent";
              const toneColor = tone==="ok"?"var(--ok)"
                              : tone==="warn"?"var(--warn)"
                              : tone==="danger"?"var(--accent-ink)":"var(--ink-3)";
              return (
                <tr key={x.crossId || i}
                    style={{borderTop:"1px solid var(--line)",
                         background: i%2===1?"var(--surface-2)":"transparent"}}>
                  <td style={{padding:"10px 12px",
                       fontFamily:"'IBM Plex Mono', monospace", fontWeight:600}}>
                    {x.datasheet
                      ? <a href={x.datasheet} target="_blank" rel="noopener"
                          style={{color:"var(--accent-ink)"}}>{x.partNumber || "—"}</a>
                      : (x.partNumber || "—")}
                  </td>
                  <td style={{padding:"10px 12px", color:"var(--ink-2)"}}>
                    {x.manufacturer || "—"}
                  </td>
                  <td style={{padding:"10px 12px"}}>
                    <span style={{
                      display:"inline-block", padding:"1px 6px", fontSize:11,
                      fontFamily:"'IBM Plex Mono', monospace",
                      background: /Active/i.test(x.lifecycle)?"var(--ok-wash)"
                        : /Obsolete|EOL|NRND/i.test(x.lifecycle)?"var(--accent-wash)"
                        : "var(--line)",
                      color: /Active/i.test(x.lifecycle)?"var(--ok)"
                        : /Obsolete|EOL|NRND/i.test(x.lifecycle)?"var(--accent-ink)"
                        : "var(--ink-3)",
                    }}>{x.lifecycle || "—"}</span>
                  </td>
                  <td style={{padding:"10px 12px"}}>
                    {x.type
                      ? <span style={{
                          display:"inline-block", padding:"1px 7px", fontSize:10.5,
                          fontFamily:"'IBM Plex Mono', monospace",
                          background: toneBg, color: toneColor,
                          border: `1px solid ${toneColor}`, borderRadius:2,
                          letterSpacing:"0.04em",
                        }} title={x.typeLabel}>{x.type}</span>
                      : "—"}
                    {x.typeLabel && <span style={{marginLeft:6, fontSize:11, color:"var(--ink-3)"}}>
                      {x.typeLabel}
                    </span>}
                  </td>
                  <td style={{padding:"10px 12px",
                       fontFamily:"'IBM Plex Mono', monospace", fontSize:11.5,
                       color: /Yes|Compliant/i.test(x.rohs)?"var(--ok)":"var(--ink-3)"}}>
                    {x.rohs ? (/Yes|Compliant/i.test(x.rohs) ? "✓ "+x.rohs : x.rohs) : "—"}
                  </td>
                  <td style={{padding:"10px 12px", textAlign:"right",
                       fontFamily:"'IBM Plex Mono', monospace"}}>
                    <div>{fmt$(x.pricing.min)}</div>
                    <div style={{fontSize:10.5, color:"var(--ink-3)"}}>
                      {fmt$(x.pricing.avg)}
                    </div>
                  </td>
                  <td style={{padding:"10px 12px",
                       fontFamily:"'IBM Plex Mono', monospace", fontSize:11.5}}>
                    {weeks(x.pricing.minLeadtime, x.pricing.maxLeadtime)}
                  </td>
                  <td style={{padding:"10px 12px", color:"var(--ink-2)"}}>
                    <div style={{display:"-webkit-box", WebkitLineClamp:2,
                         WebkitBoxOrient:"vertical", overflow:"hidden", lineHeight:1.4}}>
                      {x.description || "—"}
                    </div>
                    {x.comment &&
                      <div style={{fontSize:10.5, color:"var(--warn)", marginTop:3}}>
                        · {x.comment}
                      </div>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Pagination */}
      {totalPages > 1 && (
        <div style={{padding:"12px 18px", borderTop:"1px solid var(--line)",
             display:"flex", alignItems:"center", gap:8,
             fontFamily:"'IBM Plex Mono', monospace", fontSize:11.5}}>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))}
            disabled={safePage===0} style={{
              padding:"3px 8px", border:"1px solid var(--line-2)", background:"transparent",
              cursor: safePage===0?"default":"pointer", opacity: safePage===0?0.4:1,
              fontFamily:"inherit", fontSize:"inherit",
            }}>‹ prev</button>
          <span style={{color:"var(--ink-3)"}}>
            {safePage+1} / {totalPages}
          </span>
          <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))}
            disabled={safePage===totalPages-1} style={{
              padding:"3px 8px", border:"1px solid var(--line-2)", background:"transparent",
              cursor: safePage===totalPages-1?"default":"pointer",
              opacity: safePage===totalPages-1?0.4:1,
              fontFamily:"inherit", fontSize:"inherit",
            }}>next ›</button>
          <span style={{flex:1}}/>
          <span style={{color:"var(--ink-4)", fontSize:10.5}}>
            {lang==="en"?"Rows":"列"} {safePage*pageSize+1}–{Math.min((safePage+1)*pageSize, filtered.length)}
          </span>
        </div>
      )}
    </>
  );
}
window.CrossReference = CrossReference;


// ---------- Pricing ----------
function Pricing({ t, lang, p, chartMode }){
  const hasReal = Array.isArray(p.priceHistory) && p.priceHistory.length > 0;
  const fmt$ = v => typeof v === "number"
    ? "$" + v.toFixed(4).replace(/0+$/,"").replace(/\.$/,"")
    : "—";
  const fmtWeeks = (mn, mx) => {
    if(typeof mn !== "number" && typeof mx !== "number") return "—";
    if(typeof mn === "number" && typeof mx === "number" && mn !== mx) return `${mn}–${mx} wk`;
    return `${mn ?? mx} wk`;
  };

  // Empty state — no SE pricing data
  if(!hasReal && !(p.distributors && p.distributors.length)
     && typeof p.priceMin !== "number" && typeof p.totalInventory !== "number"){
    return (
      <div style={{padding:"36px 18px"}}>
        <div style={{padding:"14px 16px", background:"#fbf3df",
             border:"1px solid #e6d39a", color:"#735108"}}>
          <div style={{fontWeight:600, marginBottom:4,
               display:"flex", alignItems:"center", gap:8}}>
            <span>⚠</span>
            {lang==="en"?"No pricing or stock data":"無價格與庫存資料"}
          </div>
          <div style={{fontSize:12}}>
            {lang==="en"
              ? "SiliconExpert /partDetail returned no PricingData, PriceBreaks, or FranchisedInventory for this ComID. This is common for passive/MLCC parts not stocked by authorized distributors."
              : "SiliconExpert /partDetail 未回傳此料號的價格、階梯與通路庫存。被動元件或未入倉的料號常見如此。"}
          </div>
        </div>
      </div>
    );
  }

  // Price history series for the chart (avg line + min/max band when we have them).
  const histSeries = (p.priceHistory || []).map((h, i) => ({
    i,
    label: h.date,
    avg: typeof h.avg === "number" ? h.avg : (h.min || 0),
    min: typeof h.min === "number" ? h.min : (h.avg || 0),
    max: typeof h.avg === "number"
      ? Math.max(h.avg, h.min || 0) * 1.05
      : (h.min || 0),
  }));
  const first = histSeries[0], last = histSeries[histSeries.length - 1];
  const delta = (first && last && first.avg)
    ? ((last.avg - first.avg) / first.avg) * 100
    : null;

  return (
    <>
      {/* Current metrics strip — all real SE /partDetail fields. */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(4, 1fr)",
           borderBottom:"1px solid var(--line)"}}>
        <Metric
          label={lang==="en"?"Unit price · min":"單價 · 最低"}
          value={fmt$(p.priceMin)}
          sub={typeof p.priceAvg === "number"
            ? `${lang==="en"?"avg ":"平均 "}${fmt$(p.priceAvg)}`
            : (lang==="en"?"SE PricingData":"SE 價格資料")}
        />
        <Metric
          label={lang==="en"?"Lead time":"交期"}
          value={fmtWeeks(p.minLeadWeeks, p.maxLeadWeeks)}
          sub={p.priceLastUpdated
            ? `${lang==="en"?"updated ":"更新 "}${p.priceLastUpdated}`
            : ""}
        />
        <Metric
          label={lang==="en"?"Total on hand":"通路總庫存"}
          value={typeof p.totalInventory === "number"
            ? p.totalInventory.toLocaleString() : "—"}
          sub={typeof p.averageInventory === "number"
            ? `${lang==="en"?"avg ":"平均 "}${p.averageInventory.toLocaleString()}`
            : ""}
        />
        <Metric
          label={lang==="en"?"Authorized distributors":"授權通路"}
          value={typeof p.authDistCount === "number"
            ? String(p.authDistCount) : "—"}
          sub={typeof p.distributorsWithStock === "number"
            ? `${p.distributorsWithStock} ${lang==="en"?"with stock":"有庫存"}`
            : ""}
        />
      </div>

      {/* Price / lead-time history from /partDetail.PriceAndLeadTimeHistory */}
      {hasReal && (
        <Section
          title={lang==="en"?"Price & lead-time history · SE":"價格與交期紀錄 · SE"}
          subtitle={`· ${p.priceHistory.length} ${lang==="en"?"snapshots":"筆"} · USD`}
          right={<>
            {delta != null &&
              <span style={{fontSize:11, color:"var(--ink-3)", marginRight:10,
                   fontFamily:"'IBM Plex Mono', monospace"}}>
                Δ <b style={{color: delta > 0 ? "var(--warn)":"var(--ok)"}}>
                  {delta > 0 ? "▲" : "▼"} {Math.abs(delta).toFixed(1)}%
                </b>
              </span>}
            <Btn variant="quiet" size="sm" icon={Ico.exp()}>CSV</Btn>
          </>}>
          <div style={{height:180, position:"relative"}}>
            <MiniTrend series={histSeries}/>
          </div>
        </Section>
      )}

      {/* Price break tiers from /partDetail.PriceBreaksData */}
      {Array.isArray(p.priceBreaks) && p.priceBreaks.length > 0 && (
        <Section
          title={lang==="en"?"Volume price breaks · SE":"階梯價 · SE"}
          subtitle={`· ${p.priceBreaks.length} ${lang==="en"?"tiers":"階"}`}>
          <table style={{width:"100%", borderCollapse:"collapse", fontSize:12.5}}>
            <thead>
              <tr style={{color:"var(--ink-4)", textAlign:"left",
                   fontFamily:"'IBM Plex Mono', monospace",
                   fontSize:10.5, letterSpacing:"0.1em"}}>
                <th style={{padding:"8px 4px", fontWeight:500, textTransform:"uppercase",
                     width:"30%"}}>{lang==="en"?"Quantity":"數量"}</th>
                <th style={{padding:"8px 4px", fontWeight:500, textTransform:"uppercase",
                     textAlign:"right"}}>{lang==="en"?"Min price":"最低價"}</th>
                <th style={{padding:"8px 4px", fontWeight:500, textTransform:"uppercase",
                     textAlign:"right"}}>{lang==="en"?"Avg price":"平均價"}</th>
                <th style={{padding:"8px 4px"}}/>
              </tr>
            </thead>
            <tbody>
              {p.priceBreaks.map((b,i)=>{
                const maxQty = Math.max(...p.priceBreaks.map(x => x.qty || 0), 1);
                const barPct = b.qty ? Math.max(2, (b.qty/maxQty)*100) : 0;
                return (
                  <tr key={i} style={{borderTop:"1px solid var(--line)"}}>
                    <td style={{padding:"8px 4px",
                         fontFamily:"'IBM Plex Mono', monospace", fontWeight:600}}>
                      {typeof b.qty === "number" ? b.qty.toLocaleString() : "—"}
                    </td>
                    <td style={{padding:"8px 4px",
                         fontFamily:"'IBM Plex Mono', monospace", textAlign:"right"}}>
                      {fmt$(b.min)}
                    </td>
                    <td style={{padding:"8px 4px", color:"var(--ink-3)",
                         fontFamily:"'IBM Plex Mono', monospace", textAlign:"right"}}>
                      {fmt$(b.avg)}
                    </td>
                    <td style={{padding:"8px 4px", width:"30%"}}>
                      <div style={{height:4, background:"var(--line)"}}>
                        <div style={{width:`${barPct}%`, height:"100%",
                             background:"var(--accent)"}}/>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </Section>
      )}

      {/* Authorized distributor stock — from /partDetail.FranchisedInventoryData */}
      {Array.isArray(p.distributors) && p.distributors.length > 0 && (
        <Section
          title={lang==="en"?"Authorized distributors · stock":"授權通路庫存"}
          subtitle={`· ${p.distributors.length} ${lang==="en"?"channels":"通路"} · ${typeof p.distributorsWithStock==="number" ? p.distributorsWithStock : "—"} ${lang==="en"?"with stock":"有庫存"}`}
          right={<span style={{fontSize:10.5, color:"var(--ink-4)",
               fontFamily:"'IBM Plex Mono', monospace"}}>
            /partDetail · FranchisedInventoryData
          </span>}>
          <table style={{width:"100%", borderCollapse:"collapse", fontSize:12.5}}>
            <thead>
              <tr style={{color:"var(--ink-4)", textAlign:"left",
                   fontFamily:"'IBM Plex Mono', monospace",
                   fontSize:10.5, letterSpacing:"0.1em"}}>
                <th style={{padding:"8px 4px", fontWeight:500, textTransform:"uppercase",
                     width:"28%"}}>{lang==="en"?"Distributor":"通路"}</th>
                <th style={{padding:"8px 4px", fontWeight:500, textTransform:"uppercase",
                     textAlign:"right"}}>{lang==="en"?"On hand":"庫存"}</th>
                <th style={{padding:"8px 4px", fontWeight:500, textTransform:"uppercase"}}>
                  {lang==="en"?"Last updated":"更新時間"}
                </th>
                <th style={{padding:"8px 4px", fontWeight:500, textTransform:"uppercase",
                     textAlign:"right"}}>{lang==="en"?"Action":"操作"}</th>
              </tr>
            </thead>
            <tbody>
              {p.distributors.map((d,i)=>{
                const qty = d.quantity;
                const maxQ = Math.max(...p.distributors.map(x => x.quantity || 0), 1);
                const barPct = (qty ?? 0) > 0 ? Math.max(2, (qty/maxQ)*100) : 0;
                return (
                  <tr key={i} style={{borderTop:"1px solid var(--line)"}}>
                    <td style={{padding:"10px 4px"}}>
                      <div style={{display:"flex", alignItems:"center", gap:10}}>
                        <span style={{width:6, height:22,
                          background: (qty||0) > 0 ? "var(--ok)" : "var(--line-strong)"}}/>
                        <span style={{fontWeight:500}}>{d.distributor || "—"}</span>
                      </div>
                    </td>
                    <td style={{padding:"10px 4px",
                         fontFamily:"'IBM Plex Mono', monospace", textAlign:"right"}}>
                      <div style={{fontWeight: qty > 0 ? 600 : 400,
                           color: qty > 0 ? "var(--ink)" : "var(--ink-4)"}}>
                        {typeof qty === "number" ? qty.toLocaleString() : "—"}
                      </div>
                      {qty > 0 &&
                        <div style={{height:3, background:"var(--line)", marginTop:4}}>
                          <div style={{width:`${barPct}%`, height:"100%",
                               background:"var(--ok)"}}/>
                        </div>}
                    </td>
                    <td style={{padding:"10px 4px", color:"var(--ink-3)",
                         fontFamily:"'IBM Plex Mono', monospace", fontSize:11.5}}>
                      {d.lastUpdated || "—"}
                    </td>
                    <td style={{padding:"10px 4px", textAlign:"right"}}>
                      {d.buyNowLink
                        ? <a href={d.buyNowLink} target="_blank" rel="noopener"
                            style={{
                              display:"inline-block", padding:"4px 10px", fontSize:11,
                              fontFamily:"'IBM Plex Mono', monospace",
                              background: qty > 0 ? "var(--ink)" : "transparent",
                              color: qty > 0 ? "#fff" : "var(--ink-3)",
                              border:`1px solid ${qty > 0 ? "var(--ink)" : "var(--line-2)"}`,
                              textDecoration:"none", borderRadius:2,
                            }}>
                            {lang==="en"?"Buy now ↗":"購買 ↗"}
                          </a>
                        : <span style={{fontSize:11, color:"var(--ink-4)"}}>—</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </Section>
      )}

}

// ---------- Compliance ----------
function Compliance({ t, lang, p }){
  const reg = p.regulatory || {};
  const chemicals = Array.isArray(p.chemicals) ? p.chemicals : [];
  const hasReg = reg && Object.keys(reg).length > 0;

  // Status-tone helper: "Compliant"/"Yes"/"DRC Conflict Free" -> ok, etc.
  const tone = v => {
    const s = (v||"").toString().toLowerCase();
    if(!s) return "neutral";
    if(/^yes$|compliant|free|unaffected/.test(s)) return "ok";
    if(/no$|not required/.test(s)) return "neutral";
    if(/affected|contains|restricted|exceed/.test(s)) return "danger";
    return "neutral";
  };

  // Empty state when the backend has no regulatory data AND no chemicals.
  if(!hasReg && !chemicals.length){
    return (
      <div style={{padding:"36px 18px"}}>
        <div style={{padding:"14px 16px", background:"#fbf3df",
             border:"1px solid #e6d39a", color:"#735108"}}>
          <div style={{fontWeight:600, marginBottom:4,
               display:"flex", alignItems:"center", gap:8}}>
            <span>⚠</span>
            {lang==="en"?"No compliance data":"無法規資料"}
          </div>
          <div style={{fontSize:12}}>
            {lang==="en"
              ? "SiliconExpert /partDetail returned no EnvironmentalDto, ReachData, or ChemicalData for this ComID."
              : "SiliconExpert /partDetail 未回傳此料號的環境、REACH 或物質資料。"}
          </div>
        </div>
      </div>
    );
  }

  return (
    <>
      {hasReg && <RegulatoryDeclaration reg={reg} lang={lang} tone={tone}/>}
      {chemicals.length > 0 && <ChemicalDataSection rows={chemicals} lang={lang}/>}
    </>
  );
}

// ---------- Chemical data ----------
function ChemicalDataSection({ rows, lang }){
  const [expandedPPM, setExpandedPPM] = React.useState(false);
  const sorted = [...rows].sort((a,b) => (b.ppm || 0) - (a.ppm || 0));
  const mdsUrl = sorted.find(r => r.mdsUrl)?.mdsUrl || "";
  const fmtMass = v => {
    if(v == null) return "—";
    if(v < 0.0001) return v.toExponential(3);
    return v.toFixed(6);
  };
  const fmtPPM = v => typeof v === "number"
    ? (v >= 1000 ? v.toLocaleString(undefined, {maximumFractionDigits: 2}) : v.toFixed(4))
    : "—";

  // Aggregate top-level metrics (first row carries totals).
  const first = sorted[0] || {};
  const locGroups = Array.from(new Set(sorted.map(r => r.locationName).filter(Boolean)));
  const totalSubstances = sorted.length;

  return (
    <Section title={lang==="en"?"Chemical data · SE":"物質組成資料 · SE"}
      subtitle={lang==="en"
        ? `· ${totalSubstances} substances · ${locGroups.length} materials`
        : `· ${totalSubstances} 物質 · ${locGroups.length} 材料`}
      right={mdsUrl ? <Btn variant="quiet" size="sm" icon={Ico.dl()}
        onClick={()=>window.open(mdsUrl,"_blank","noopener")}>
        {lang==="en"?"Material declaration":"材料聲明"}
      </Btn> : null}>

      {/* Totals strip */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(4, 1fr)",
           border:"1px solid var(--line)", background:"#fff", marginBottom:12}}>
        <MfrMetric label={lang==="en"?"ComID":"ComID"} value={first.comId || "—"}/>
        <MfrMetric label={lang==="en"?"Total mass (g)":"總質量 (g)"}
          value={fmtMass(first.totalMassInGram)}/>
        <MfrMetric label={lang==="en"?"Sum of subs (g)":"物質總和 (g)"}
          value={fmtMass(first.totalMassSummationInGram)}/>
        <MfrMetric label={lang==="en"?"Materials":"材料分區"}
          value={String(locGroups.length)}/>
      </div>

      <div style={{overflowX:"auto", background:"#fff", border:"1px solid var(--line)"}}>
        <table style={{width:"100%", borderCollapse:"collapse", fontSize:11.5}}>
          <thead>
            <tr style={{color:"var(--ink-4)", textAlign:"left", background:"var(--surface-2)",
                 fontFamily:"'IBM Plex Mono', monospace", fontSize:10,
                 letterSpacing:"0.08em", textTransform:"uppercase"}}>
              <th style={{padding:"8px 10px", fontWeight:500}}>
                {lang==="en"?"Location":"位置"}</th>
              <th style={{padding:"8px 10px", fontWeight:500}}>
                {lang==="en"?"Homogenous material":"均質材料"}</th>
              <th style={{padding:"8px 10px", fontWeight:500, textAlign:"right"}}>
                {lang==="en"?"Mat. mass (g)":"材料質量"}</th>
              <th style={{padding:"8px 10px", fontWeight:500}}>
                {lang==="en"?"Substance":"物質"}</th>
              <th style={{padding:"8px 10px", fontWeight:500}}>CAS #</th>
              <th style={{padding:"8px 10px", fontWeight:500, textAlign:"right"}}>
                {lang==="en"?"Sub. mass (g)":"物質質量"}</th>
              <th style={{padding:"8px 10px", fontWeight:500, textAlign:"right",
                   cursor:"pointer"}}
                  onClick={()=>setExpandedPPM(x=>!x)}
                  title={lang==="en"?"Toggle precision":"切換精度"}>
                PPM {expandedPPM ? "↺" : "▸"}</th>
              <th style={{padding:"8px 10px", fontWeight:500}}>
                {lang==="en"?"Item / sub-item":"項 / 次項"}</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((r,i)=>{
              const zebra = i%2===1 ? "var(--surface-2)" : "transparent";
              const ppmHigh = (r.ppm || 0) > 1000;
              return (
                <tr key={i} style={{borderTop:"1px solid var(--line)", background: zebra}}>
                  <td style={{padding:"8px 10px", fontWeight:500}}>
                    {r.locationName || "—"}
                  </td>
                  <td style={{padding:"8px 10px", color:"var(--ink-2)"}}>
                    {r.homogenousMaterial || "—"}
                  </td>
                  <td style={{padding:"8px 10px", textAlign:"right",
                       fontFamily:"'IBM Plex Mono', monospace", color:"var(--ink-3)"}}>
                    {fmtMass(r.homogenousMaterialMass)}
                  </td>
                  <td style={{padding:"8px 10px",
                       fontWeight: r.normalizedSubstance === r.substanceIdentification ? 500 : 400}}>
                    {r.substanceIdentification || "—"}
                    {r.normalizedSubstance && r.normalizedSubstance !== r.substanceIdentification &&
                      <div style={{fontSize:10, color:"var(--ink-4)"}}>
                        ≈ {r.normalizedSubstance}
                      </div>}
                  </td>
                  <td style={{padding:"8px 10px",
                       fontFamily:"'IBM Plex Mono', monospace", fontSize:10.5,
                       color: r.casNumber && r.casNumber !== "N/A" ? "var(--ink-2)" : "var(--ink-4)"}}>
                    {r.casNumber || "—"}
                  </td>
                  <td style={{padding:"8px 10px", textAlign:"right",
                       fontFamily:"'IBM Plex Mono', monospace", color:"var(--ink-3)"}}>
                    {fmtMass(r.substanceMass)}
                  </td>
                  <td style={{padding:"8px 10px", textAlign:"right",
                       fontFamily:"'IBM Plex Mono', monospace",
                       fontWeight: ppmHigh ? 600 : 400,
                       color: ppmHigh ? "var(--ink)" : "var(--ink-3)"}}>
                    {expandedPPM
                      ? (r.ppm != null ? r.ppm.toString() : "—")
                      : fmtPPM(r.ppm)}
                  </td>
                  <td style={{padding:"8px 10px", color:"var(--ink-3)", fontSize:11}}>
                    {r.itemSubItem || "—"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div style={{marginTop:8, fontSize:10.5, color:"var(--ink-4)",
           fontFamily:"'IBM Plex Mono', monospace"}}>
        {lang==="en"
          ? "Source: SE /partDetail · ChemicalData.ChemicalDto · " +
            "fields: ComID, TotalMassInGram, TotalMassSummationInGram, LocationName, " +
            "HomogenousMaterial, HomogenousMaterialMass, SubstanceIdentification, " +
            "NormalizedSubstance, SubstanceMass, PPM, CASNumber, MDSURL, ItemSubItem"
          : "資料來源:SE /partDetail · ChemicalData.ChemicalDto"}
      </div>
    </Section>
  );
}
window.ChemicalDataSection = ChemicalDataSection;
window.RegulatoryDeclaration = RegulatoryDeclaration;

// ---------- Docs ----------
function Docs({ t, lang, p }){
  const d = p.documents || {};
  const [showRevs, setShowRevs] = React.useState(false);
  const [pcnState, setPcnState] = React.useState(null); // null=loading, {}=result
  const [pcnErr, setPcnErr] = React.useState(null);

  // Lazy-fetch PCNs when Docs tab mounts (keyed on comId/pn).
  React.useEffect(()=>{
    const qs = new URLSearchParams();
    if(p.id) qs.set("comId", String(p.id));
    else if(p.advPN) qs.set("pn", p.advPN);
    if(!qs.toString()){ setPcnState({ pcns: [], count: 0, reason: "No ComID to query" }); return; }
    let cancelled = false;
    setPcnState(null); setPcnErr(null);
    fetch(`/api/pcn?${qs}`)
      .then(r => r.json())
      .then(j => { if(!cancelled) setPcnState(j); })
      .catch(e => { if(!cancelled) setPcnErr(String(e)); });
    return ()=>{ cancelled = true; };
  }, [p.id, p.advPN]);

  const imgLarge = d.images?.large;
  const imgSmall = d.images?.small;

    ds.latestUrl || (ds.history && ds.history.length) || certs.length ||

        <Section title={lang==="en"?"Product image · SE":"產品圖片 · SE"}

              <MfrKV label={lang==="en"?"ComID":"ComID"} value={p.id} mono/>
              <MfrKV label={lang==="en"?"Manufacturer":"製造商"} value={p.mfr}/>

              </div>

      {(ds.latestUrl || (ds.history && ds.history.length > 0)) && (

function DocRow({ label, url, sub, primary, t }){
  if(!url) return null;
  const fn = (()=>{ try { return (new URL(url)).pathname.split("/").pop() || url; } catch { return url; } })();
  return (
    <a href={url} target="_blank" rel="noopener" style={{
      display:"flex", alignItems:"center", gap:12, padding:"10px 12px",
      border:`1px solid ${primary?"var(--ink)":"var(--line)"}`,
      background: primary?"var(--surface-2)":"#fff",
      textDecoration:"none", color:"inherit",
    }}>
      <div style={{width:34, height:40,
           background: primary?"var(--ink)":"var(--surface-2)",
           border:`1px solid ${primary?"var(--ink)":"var(--line-2)"}`,
           color: primary?"#fff":"var(--ink-3)",
           display:"flex", alignItems:"center", justifyContent:"center"}}>
        <span style={{fontSize:9, fontFamily:"'IBM Plex Mono', monospace", fontWeight:600}}>
          {/\.xlsx?($|\?)/i.test(url) ? "XLSX" : /\.pdf($|\?)/i.test(url) ? "PDF" : "DOC"}
        </span>
      </div>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:12.5, fontWeight:500,
             color: primary?"var(--ink)":"var(--ink-2)"}}>{label}</div>
        <div style={{fontSize:10.5, color:"var(--ink-3)",
             fontFamily:"'IBM Plex Mono', monospace", whiteSpace:"nowrap",
             overflow:"hidden", textOverflow:"ellipsis"}}>
          {sub ? `${sub} · ${fn}` : fn}
        </div>
      </div>
      <span style={{color:"var(--ink-3)", fontSize:12}}>↗</span>
    </a>
  );
}
window.Docs = Docs;
window.DocRow = DocRow;

function CountriesOfOrigin({ t, lang, p }){
  const rows = Array.isArray(p.countries) ? p.countries : [];
  const en = lang === "en";

  if(!rows.length){
    return (
      <div style={{padding:"36px 18px"}}>
        <div style={{padding:"14px 16px", background:"#fbf3df",
             border:"1px solid #e6d39a", color:"#735108"}}>
          <div style={{fontWeight:600, marginBottom:4,
               display:"flex", alignItems:"center", gap:8}}>
            <span>⚠</span>{en?"No country-of-origin data":"無原產地資料"}
          </div>
          <div style={{fontSize:12}}>
            {en
              ? "SiliconExpert /partDetail returned no SummaryData.CountriesOfOrigin for this ComID."
              : "SiliconExpert /partDetail 未回傳此料號的原產地資訊。"}
          </div>
        </div>
      </div>
    );
  }

  // Sort: countries with a Source URL first (better provenance), then alpha.
  const sorted = [...rows].sort((a,b) =>
    (b.source ? 1 : 0) - (a.source ? 1 : 0) ||
    a.country.localeCompare(b.country));
  const withSource = sorted.filter(r => r.source).length;
  const comId = (rows[0] && rows[0].comId) || p.id || "—";

  // Best-effort country → ISO flag emoji for a quick visual.
  const FLAGS = {
    "China":"🇨🇳","Taiwan":"🇹🇼","Japan":"🇯🇵","Korea":"🇰🇷","South Korea":"🇰🇷",
    "United States":"🇺🇸","USA":"🇺🇸","Germany":"🇩🇪","France":"🇫🇷","Italy":"🇮🇹",
    "United Kingdom":"🇬🇧","UK":"🇬🇧","Spain":"🇪🇸","Portugal":"🇵🇹",
    "Thailand":"🇹🇭","Philippines":"🇵🇭","Malaysia":"🇲🇾","Singapore":"🇸🇬",
    "Vietnam":"🇻🇳","Indonesia":"🇮🇩","India":"🇮🇳","Mexico":"🇲🇽",
    "Ireland":"🇮🇪","Netherlands":"🇳🇱","Belgium":"🇧🇪","Austria":"🇦🇹",

// Download · Export · Watch · Compare — four dedicated action screens reached
// from the Results page. Each shares a common fetch+enrich pipeline through
// useSearchResults(), mirrors the ResultsScreen data model, and follows the
// SiliconExpert / Mouser / Digi-Key design conventions: a compact header, a
// two-pane layout (selection on the left, configuration / preview on the
// right), and a clear primary action in the top right.

// ---------- Shared hook: fetch + enrich results -----------------------------
function useSearchResults({ query, bulk, pns }){
  const [parts, setParts] = React.useState(null);     // null = loading
  const [progress, setProgress] = React.useState({ phase:"search", done:0, total:0 });
  const [bulkMeta, setBulkMeta] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(()=>{
    let cancelled = false;
    setParts(null); setError(null); setBulkMeta(null);
    setProgress({ phase:"search", done:0, total:0 });
    const hasBulk = bulk && Array.isArray(pns) && pns.length > 0;
    if(!hasBulk && (!query || !query.trim())){ setParts([]); return; }
    (async ()=>{
      try {
        let hits = [];
        if(hasBulk){
          const res = await API.bulk(pns);
          if(cancelled) return;
          setBulkMeta({
            total: res.total || pns.length,
            limit: res.limit || 50,
            truncated: !!res.truncated,
            missing: Array.isArray(res.missing) ? res.missing : [],
          });
          hits = Array.isArray(res.hits) ? res.hits : [];
        } else {
          const res = await API.search(query);
          if(cancelled) return;
          hits = Array.isArray(res.hits) ? res.hits : [];
        }
        if(!cancelled) setProgress({ phase:"details", done:0, total:hits.length });
        const enriched = await Promise.all(hits.map(async h => {
          try {
            if(!h.comId && !h.pn) return { hit: h };
            const d = await API.detail(h.comId ? { comId: h.comId } : { pn: h.pn });
            return { hit: h, part: d?.part, lifecycle: d?.lifecycle,
                     commercial: d?.commercial, parametric: d?.parametric,
                     regulatory: d?.regulatory, chemicals: d?.chemicals,
                     documents: d?.documents, packaging: d?.packaging,
                     countries: d?.countries, cand: d?.raw?.candidate, raw: d };
          } catch { return { hit: h }; }
          finally {
            if(!cancelled) setProgress(p => ({ ...p, done: p.done + 1 }));
          }
        }));
        if(cancelled) return;
        const mapped = enriched.map((e, i)=>{
          const tpl = PARTS[i % PARTS.length];
          const id = e.hit.comId || e.hit.pn || `${i}`;
          const best = {
            pn:           (e.hit && e.hit.pn)           || (e.cand && e.cand.pn)           || "",
            mpn:          (e.hit && e.hit.mpn)          || (e.cand && e.cand.mpn)          || "",
            manufacturer: (e.hit && e.hit.manufacturer) || (e.cand && e.cand.manufacturer) || "",
            comId:        (e.hit && e.hit.comId)        || (e.cand && e.cand.comId)        || "",
            source:       (e.hit && e.hit.source)       || (e.cand && e.cand.source)       || "",
            reason:       (e.hit && e.hit.reason)       || (e.cand && e.cand.reason)       || "",
          };
          const merged = mergeApiPart({ ...tpl, id, priceSeed: tpl.priceSeed+i },
                                      best, e.part, e.lifecycle, e.commercial, e.parametric,
                                      e.regulatory, e.chemicals, e.documents,
                                      e.packaging, e.countries);
          merged.__raw = e;
          return merged;
        });
        setParts(mapped);
      } catch(err){ if(!cancelled){ setError(String(err)); setParts([]); } }
    })();
    return ()=>{ cancelled = true; };
  }, [query, bulk, Array.isArray(pns) ? pns.join("|") : ""]);

  return { parts, progress, bulkMeta, error, loading: parts === null };
}

function DownloadScreen({ t, lang, go, route }){
  const en = lang === "en";
  const { parts, loading, progress } = useSearchResults({
    query: route.q, bulk: !!route.bulk, pns: route.pns,
  });
  const real = parts || [];
  const [selParts, setSelParts] = React.useState([]);
  const [selSecs, setSelSecs]   = React.useState(
    REPORT_SECTIONS.map(([k])=>k)
  );
  const [pageSize, setPageSize] = React.useState("A4");     // A4 | Letter
  const [detail, setDetail]     = React.useState("full");   // full | summary
  const [cover, setCover]       = React.useState(true);

  React.useEffect(()=>{
    if(!loading && !selParts.length && real.length){
      setSelParts(real.map(p=>p.id));
    }
  }, [loading, real.length]);

  const chosen = real.filter(p => selParts.includes(p.id));
  const pageCount = (cover?1:0) + chosen.length * selSecs.length;
  const fileName = `siliconexpert-report-${new Date().toISOString().slice(0,10)}.pdf`;

  const triggerPrint = () => {
    if(!chosen.length){
      alert(en ? "Select at least one component." : "請至少選擇一筆零件。");
      return;
    }
    const html = buildReportHtml({
      parts: chosen, sections: selSecs,
      cover, pageSize, detail, lang,
    });
    openPrintWindow(html, en
      ? "Generating PDF — allow pop-ups if nothing appears."
      : "正在產生 PDF,若未開啟請允許快顯視窗。");
  };

  const primary = (
    <Btn variant="primary" icon={Ico.dl()}
         onClick={triggerPrint}>
      {en ? "Generate PDF" : "產生 PDF"}
    </Btn>
  );

  return (
    <ActionShell t={t} lang={lang} go={go} route={route}
      title={en ? "Download · PDF report" : "下載 · PDF 報告"}
      subtitle={en
        ? `${chosen.length} components · ${selSecs.length} sections · ~${pageCount} pages · ${pageSize}`
        : `已選 ${chosen.length} 筆 · ${selSecs.length} 章節 · 約 ${pageCount} 頁 · ${pageSize}`}
      primary={primary}>

      {loading ? (
        <ResultsLoading progress={progress} lang={lang}
          isBulk={!!route.bulk}
          pnsCount={Array.isArray(route.pns)?route.pns.length:0}/>
      ) : (
        <div style={{display:"grid", gridTemplateColumns:"1.1fr 1fr 1fr", gap:14}}>
          <PartChecklist lang={lang} parts={real}
            selected={selParts} setSelected={setSelParts}
            title={en?"Components":"零件"}/>
          <SectionChecklist lang={lang}
            selected={selSecs} setSelected={setSelSecs}
            title={en?"Report sections":"章節"}/>
          <div style={{background:"#fff", border:"1px solid var(--line)"}}>
            <div style={{padding:"10px 14px", borderBottom:"1px solid var(--line)",
                 fontSize:11, fontFamily:"'IBM Plex Mono', monospace",
                 letterSpacing:"0.12em", textTransform:"uppercase",
                 color:"var(--ink-3)"}}>
              {en?"Report settings":"報告設定"}
            </div>
            <div style={{padding:"12px 14px", display:"flex",
                 flexDirection:"column", gap:14}}>
              <ReportOption
                label={en?"Page size":"頁面大小"}
                options={[["A4","A4"],["Letter","Letter"]]}
                value={pageSize} onChange={setPageSize}/>
              <ReportOption
                label={en?"Detail level":"內容詳盡度"}
                options={[["full",en?"Full":"完整"],["summary",en?"Summary":"摘要"]]}
                value={detail} onChange={setDetail}/>
              <label style={{display:"flex", alignItems:"center", gap:8,
                   fontSize:12.5, cursor:"pointer"}}>
                <input type="checkbox" checked={cover}
                       onChange={e=>setCover(e.target.checked)}
                       style={{accentColor:"var(--accent)"}}/>
                {en?"Include cover page":"包含封面頁"}
              </label>
              <div style={{padding:"10px 12px", background:"var(--surface)",
                   border:"1px solid var(--line)",
                   fontFamily:"'IBM Plex Mono', monospace", fontSize:11,
                   color:"var(--ink-3)", lineHeight:1.6}}>
                <div><b style={{color:"var(--ink)"}}>File:</b> {fileName}</div>
                <div><b style={{color:"var(--ink)"}}>Pages:</b> {pageCount}</div>
                <div><b style={{color:"var(--ink)"}}>Data source:</b> SiliconExpert /partDetail</div>
                <div style={{marginTop:6}}>
                  {en ? "Uses your browser's “Save as PDF” destination."
                      : "使用瀏覽器的「另存為 PDF」。"}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

    </ActionShell>
  );
}

function ReportOption({ label, options, value, onChange }){

    <div style={{display:"flex", flexDirection:"column", gap:6}}>

// ---------- PDF generation (opens a new window with a full HTML document
// and calls print() on it — avoids the inline-style vs @media-print specificity
// trap and works identically across Chromium/Firefox/Safari). ----------
function pdfSectionKv(p, sec, lang, detail){
  const en = lang === "en";
  const kv = [];
  if(sec === "overview"){
    kv.push(["MPN", p.mpn], [en?"Advantech P/N":"研華料號", p.advPN || "—"],
            [en?"Manufacturer":"製造商", p.mfr],
            [en?"Category":"類別", p.category],
            [en?"Description":"描述", p.desc],
            [en?"Lifecycle":"生命週期", p.lifecycle]);
  } else if(sec === "lifecycle"){
    kv.push([en?"Lifecycle stage":"生命週期階段", p.lifecycleStage || p.lifecycle],
            [en?"Estimated EOL":"預估停產日", p.eolDate || "—"],
            [en?"Years to EOL":"EOL 年限", (p.yeol||0).toFixed(1) + "y"],
            [en?"Overall risk":"整體風險", p.risk.toFixed(0) + "%"],
            [en?"Resilience":"韌性", typeof p.resilience === "number"
               ? p.resilience.toFixed(1)+" / 10" : "—"]);
  } else if(sec === "xref"){
    kv.push([en?"Crosses available":"替代料號", p.crossesAvailable || "—"],
            [en?"Other sources":"其他來源數", typeof p.otherSources === "number"
               ? String(p.otherSources) : "—"]);
  } else if(sec === "pricing"){
    kv.push([en?"Min unit price":"最低單價", typeof p.priceMin === "number"
               ? "$" + p.priceMin.toFixed(4) : "—"],
            [en?"Avg unit price":"平均單價", typeof p.priceAvg === "number"
               ? "$" + p.priceAvg.toFixed(4) : "—"],
            [en?"Total inventory":"總庫存", typeof p.totalInventory === "number"
               ? p.totalInventory.toLocaleString() : "—"],
            [en?"Distributors with stock":"有庫存通路", typeof p.distributorsWithStock === "number"
               ? String(p.distributorsWithStock) : "—"]);
  } else if(sec === "compliance"){
    kv.push(["RoHS", p.rohs ? (en?"Yes":"是") : (en?"No":"否")],
            ["REACH", p.reach ? (en?"Yes":"是") : (en?"No":"否")],
            ["CE", p.ce ? (en?"Yes":"是") : (en?"No":"否")]);
  } else if(sec === "documents"){
    const docs = Array.isArray(p.documents) ? p.documents : [];
    kv.push([en?"Document count":"文件數量", String(docs.length)]);
    docs.slice(0, detail==="summary"?3:12).forEach((d,i)=>
      kv.push([`${en?"Doc":"文件"} ${i+1}`, d.name || d.url || "—"]));
  } else if(sec === "packaging"){
    const pkg = p.packaging || {};
    kv.push([en?"Package":"封裝", pkg.packaging || "—"],
            [en?"Qty per packaging":"每包數量", pkg.qtyPerPackaging || "—"],
            [en?"Reel diameter":"捲盤直徑", pkg.reelDiameter || "—"],
            ["JEDEC", pkg.jedec || "—"],
            [en?"Mounting":"安裝方式", pkg.mounting || "—"]);
  } else if(sec === "countries"){
    const cs = Array.isArray(p.countries) ? p.countries : [];
    kv.push([en?"Country count":"國家數", String(cs.length)]);
    cs.slice(0, detail==="summary"?3:10).forEach((c,i)=>
      kv.push([`${en?"Country":"國家"} ${i+1}`, c.country || c.name || String(c)]));
  }
  return kv;
}

function htmlEscape(s){
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

  React.useEffect(()=>{
    if(!loading && !selParts.length && real.length){
      setSelParts(real.map(p=>p.id));
    }
  }, [loading, real.length]);

  const payload = React.useMemo(()=>{
    const chosen = real.filter(p => selParts.includes(p.id));
    const pickSections = (p) => {
      const out = {};
      if(selSecs.includes("overview"))   out.overview   = {
        mpn:p.mpn, advantechPn:p.advPN, manufacturer:p.mfr,

      if(selSecs.includes("lifecycle"))  out.lifecycle  = {

      if(selSecs.includes("xref"))       out.crossReference = {
        crossesAvailable:p.crossesAvailable, otherSources:p.otherSources };
      if(selSecs.includes("pricing"))    out.pricingAndStock = {
        minUnitPrice:p.priceMin, avgUnitPrice:p.priceAvg,
        totalInventory:p.totalInventory,
        distributorsWithStock:p.distributorsWithStock };
      if(selSecs.includes("compliance")) out.compliance = {
        rohs:!!p.rohs, reach:!!p.reach, ce:!!p.ce };
      if(selSecs.includes("documents"))  out.documents = p.documents || [];
      if(selSecs.includes("packaging"))  out.packaging = p.packaging || null;
      if(selSecs.includes("countries"))  out.countriesOfOrigin = p.countries || [];
      if(includeRaw && p.__raw)          out._raw = p.__raw;
      return out;
    };

      return { generatedAt: new Date().toISOString(),
               source:"SiliconExpert /partDetail",

        manufacturer: p.mfr, ...pickSections(p),
      })),

  const json = React.useMemo(
    ()=>JSON.stringify(payload, null, pretty ? 2 : 0),

  );

  const copy = async () => {
    try { await navigator.clipboard.writeText(json);

            <SectionChecklist lang={lang}
              selected={selSecs} setSelected={setSelSecs}
              title={en?"Fields":"欄位"}/>
            <div style={{background:"#fff", border:"1px solid var(--line)",
                 padding:"12px 14px", display:"flex", flexDirection:"column",
                 gap:12}}>
              <ReportOption
                label={en?"Schema":"格式"}
                options={[["advantech",en?"Advantech":"研華"],["se-flat","SE-flat"]]}
                value={schema} onChange={setSchema}/>
              <label style={{display:"flex", alignItems:"center", gap:8,
                   fontSize:12.5, cursor:"pointer"}}>
                <input type="checkbox" checked={pretty}
                       onChange={e=>setPretty(e.target.checked)}
                       style={{accentColor:"var(--accent)"}}/>

              </label>
            </div>
          </div>
          <div style={{background:"#fff", border:"1px solid var(--line)",
               display:"flex", flexDirection:"column",
               minHeight: 500, maxHeight: 680,
          }}>
            <div style={{padding:"10px 14px", borderBottom:"1px solid var(--line)",
                 display:"flex", alignItems:"center", gap:10,
                 fontSize:11, fontFamily:"'IBM Plex Mono', monospace",
                 letterSpacing:"0.12em", textTransform:"uppercase",
                 color:"var(--ink-3)"}}>
              <span style={{flex:1}}>{en?"Preview":"預覽"}</span>
              <span style={{color:"var(--ink-4)", letterSpacing:"0.04em",

              {json}

          </div>
        </div>
      )}
    </ActionShell>
  );
}

function WatchScreen({ t, lang, go, route }){
  const en = lang === "en";
  // Current results — always selectable.
  const { parts, loading, progress } = useSearchResults({
    query: route.q, bulk: !!route.bulk, pns: route.pns,
  });
  // Last 50 recent searches (SQLite-backed).
  const [recent, setRecent] = React.useState(null);
  const [recentErr, setRecentErr] = React.useState(null);
  React.useEffect(()=>{
    let cancelled = false;
    (async ()=>{
      try {
        const j = await API.recent(50);
        if(!cancelled) setRecent(Array.isArray(j.items) ? j.items : []);
      } catch(err){ if(!cancelled){ setRecentErr(String(err)); setRecent([]); } }
    })();
    return ()=>{ cancelled = true; };
  }, []);

  const combined = React.useMemo(()=>{
    // Merge current results (preferred, richer) + recent history, de-dup by pn.
    const byPn = new Map();
    (parts || []).forEach(p => byPn.set(p.advPN || p.mpn, {
      id:    p.advPN || p.mpn,
      mpn:   p.mpn, advPN: p.advPN, mfr: p.mfr,
      lifecycle: p.lifecycle, yeol: p.yeol, risk: p.risk,
      source: "current",
    }));
    (recent || []).forEach(r => {
      const key = r.pn;
      if(!byPn.has(key)) byPn.set(key, {
        id: key, mpn: r.mpn || "", advPN: r.pn, mfr: r.manufacturer || "—",
        lifecycle: r.lifecycle || "—", yeol: r.yeol || 0, risk: 0,
        source: "recent", searchedAt: r.searchedAt,
      });
    });
    return Array.from(byPn.values()).slice(0, 50);
  }, [parts, recent]);

  const WATCH_KEY = "ci-watchlist";
  const [saved, setSavedState] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(WATCH_KEY) || "null"); }
    catch { return null; }
  });

  const [selParts, setSelParts] = React.useState([]);
  const [email, setEmail]       = React.useState("daniellee1969@gmail.com");
  const [freq, setFreq]         = React.useState("daily"); // realtime | daily | weekly
  const [events, setEvents]     = React.useState(["pcn","eol","nrnd","pricing","stock","compliance"]);
  const [severity, setSeverity] = React.useState("medium"); // low | medium | high
  const [webhook, setWebhook]   = React.useState("");
  const [busy, setBusy]         = React.useState(false);
  const [toast, setToast]       = React.useState(null);

  React.useEffect(()=>{
    if(saved && saved.partIds && !selParts.length){
      setSelParts(saved.partIds);
      setEmail(saved.email || email);
      setFreq(saved.freq || "daily");
      setEvents(saved.events || events);
      setSeverity(saved.severity || "medium");
      setWebhook(saved.webhook || "");
    } else if(!saved && parts && parts.length && !selParts.length){
      // Pre-select the current result set once /api/search has resolved —
      // keyed on `parts` (stable once loaded) rather than combined.length
      // (flips as recent searches also stream in).
      setSelParts(parts.map(p => p.advPN || p.mpn));
    }
  }, [parts, saved]);

  const EVENTS = [
    ["pcn",        en?"PCN (Product Change Notice)":"PCN 產品變更通知"],
    ["eol",        en?"EOL notice":"停產通知"],

            </div>
            <div style={{padding:"14px", display:"flex",

              <div style={{display:"flex", flexDirection:"column", gap:6}}>
                <div style={{fontSize:10.5, color:"var(--ink-4)",
